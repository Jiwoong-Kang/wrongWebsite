<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="weird-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="friends.html">Friends</a>
    <a href="profile.html">My Profile</a>
    <a href="settings.html" class="active">Settings</a>
  </nav>

  <div class="page-content">
    <h1>Settings</h1>
    <p>Manage your preferences and account configuration.</p>

    <div class="settings-section">
      <h2>Notifications</h2>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" checked />
          Enable notifications
        </label>
      </div>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" checked />
          Receive email alerts
        </label>
      </div>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" checked />
          Enable push notifications
        </label>
      </div>
    </div>

    <div class="settings-section">
      <h2>Privacy</h2>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" />
          Hide online status
        </label>
      </div>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" checked />
          Public profile
        </label>
      </div>
    </div>

    <div class="settings-section">
      <h2>Advanced</h2>
      <div class="setting-row">
        <span style="font-size:14px; color:#555;">Download my data</span>
        <button onclick="alert('Feature coming soon')" style="padding:6px 14px; font-size:13px; background:#f0f0f0; color:#555; border:1px solid #ddd; border-radius:6px; cursor:pointer;">Download</button>
      </div>
      <div class="setting-row">
        <span style="font-size:14px; color:#e74c3c;">Delete account</span>
        <button onclick="confirmDelete()" style="padding:6px 14px; font-size:13px; background:#fff; color:#e74c3c; border:1px solid #e74c3c; border-radius:6px; cursor:pointer;">Delete</button>
      </div>
    </div>

    <div class="settings-section">
      <h2>Account</h2>
      <div class="setting-row">
        <span>Logged in as <strong id="loggedInUser">—</strong></span>
        <button onclick="logout()" style="padding:8px 18px; border:none; background:#e74c3c; color:#fff; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600;">Log out</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      document.getElementById('loggedInUser').textContent = payload.username;
    } catch (e) {
      document.getElementById('loggedInUser').textContent = 'unknown';
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    }

    function confirmDelete() {
      if (confirm('Are you sure you want to delete your account? This cannot be undone.')) {
        alert('Feature coming soon');
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-content">
    <h1>Settings</h1>
    <p>Manage your preferences and account configuration.</p>

    <div class="settings-section">
      <h2>Notifications</h2>
      <!-- Bug: double-negative checkbox labels that are confusing to read -->
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" checked />
          Do not disable notification opt-out
        </label>
      </div>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" />
          Unsubscribe from non-opt-out alerts
        </label>
      </div>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" checked />
          Disable disabling of push preferences
        </label>
      </div>
    </div>

    <div class="settings-section">
      <h2>Privacy</h2>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" />
          Do not prevent hiding of online status
        </label>
      </div>
      <div class="setting-row">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;">
          <input type="checkbox" checked />
          Public profile
        </label>
      </div>
    </div>

    <!-- Bug: "Advanced Settings" section appears to exist but fails to load anything -->
    <div class="settings-section">
      <h2>Advanced Settings</h2>
      <div id="advancedArea" style="min-height:60px; display:flex; align-items:center; justify-content:center;">
        <p style="color:#e74c3c; font-size:12px;">Error: Could not load advanced settings.</p>
      </div>
    </div>

    <div class="settings-section">
      <h2>Account</h2>
      <div class="setting-row">
        <span>Logged in as <strong id="loggedInUser">—</strong></span>
        <!-- Bug: Logout is large and prominent; Save (elsewhere) is tiny -->
        <button onclick="logout()" style="padding:14px 32px; border:none; background:#e74c3c; color:#fff; border-radius:6px; cursor:pointer; font-size:18px; font-weight:900;">LOG OUT</button>
      </div>
    </div>
  </div>

  <!-- Navigation stuck at bottom-right corner -->
  <nav class="weird-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="friends.html">Friends</a>
    <!-- Bug: My Profile links to friends.html instead of profile.html -->
    <a href="friends.html">My Profile</a>
    <a href="#" onclick="alert('Error: Settings failed to load. Please try again later.'); return false;" class="active">Settings</a>
  </nav>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      document.getElementById('loggedInUser').textContent = payload.username;
    } catch (e) {
      document.getElementById('loggedInUser').textContent = 'unknown';
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

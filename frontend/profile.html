<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="weird-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="friends.html">Friends</a>
    <a href="profile.html" class="active">My Profile</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="page-content">
    <h1>My Profile</h1>
    <p>Your personal information.</p>

    <div class="profile-header">
      <div class="profile-avatar" id="profileInitial">—</div>
      <div class="profile-info">
        <h2 id="profileName">—</h2>
        <p id="profileSince">—</p>
      </div>
    </div>

    <div class="card-row" style="margin-top: 24px;">
      <div class="card">
        <h3>Posts</h3>
        <div class="number" id="profilePosts">—</div>
      </div>
      <div class="card">
        <h3>Friends</h3>
        <div class="number" id="profileFriends">—</div>
      </div>
    </div>

    <div style="margin-top:28px; background:#fff; border-radius:10px; padding:24px; box-shadow:0 4px 16px rgba(0,0,0,0.06);">
      <h3 style="font-size:14px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px;">Edit Profile</h3>

      <div class="form-group">
        <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Display Name</label>
        <input type="text" id="editName" placeholder="Enter display name"
          style="width:100%; padding:10px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; outline:none;" />
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Bio</label>
        <textarea id="editBio" rows="3" placeholder="Write something about yourself..."
          style="width:100%; padding:10px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; resize:none; outline:none;"></textarea>
      </div>

      <p id="saveError" style="font-size:13px; color:#e74c3c; margin-top:8px; display:none;"></p>

      <div style="display:flex; align-items:center; gap:10px; margin-top:12px;">
        <button onclick="saveProfile()" style="padding:8px 20px; font-size:14px; background:#667eea; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600;">Save</button>
        <span id="saveSuccess" style="font-size:13px; color:#27ae60; display:none;">Saved!</span>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    async function loadProfile() {
      try {
        const res = await fetch('/api/profile', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'index.html';
          return;
        }

        const data = await res.json();
        document.getElementById('profileInitial').textContent = data.initial;
        document.getElementById('profileName').textContent = data.name;
        document.getElementById('profileSince').textContent = `Member since ${data.memberSince}`;
        document.getElementById('profilePosts').textContent = data.posts;
        document.getElementById('profileFriends').textContent = data.friends;
      } catch (err) {
        console.error('Failed to load profile:', err);
      }
    }

    async function saveProfile() {
      const name = document.getElementById('editName').value.trim();
      const bio = document.getElementById('editBio').value.trim();
      const successMsg = document.getElementById('saveSuccess');
      const errorMsg = document.getElementById('saveError');
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      if (!name && !bio) return;

      try {
        const res = await fetch('/api/profile', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ name, bio }),
        });

        if (res.ok) {
          document.getElementById('editName').value = '';
          document.getElementById('editBio').value = '';
          successMsg.style.display = 'inline';
          setTimeout(() => successMsg.style.display = 'none', 2000);
          loadProfile();
        } else {
          const data = await res.json();
          errorMsg.textContent = data.error || 'Failed to save';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server';
        errorMsg.style.display = 'block';
      }
    }

    loadProfile();
  </script>
</body>
</html>

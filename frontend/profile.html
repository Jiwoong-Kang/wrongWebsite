<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-content">
    <h1>My Profile</h1>
    <p>Your personal information.</p>

    <!-- Bug: on mobile ≤360px, profile-avatar overlaps the buttons below via CSS -->
    <div class="profile-header">
      <div class="profile-avatar" id="profileInitial">—</div>
      <div class="profile-info">
        <h2 id="profileName">—</h2>
        <p id="profileSince">—</p>
      </div>
    </div>

    <div class="card-row" style="margin-top: 24px;">
      <div class="card">
        <h3>Posts</h3>
        <div class="number" id="profilePosts">—</div>
      </div>
      <div class="card">
        <h3>Friends</h3>
        <div class="number" id="profileFriends">—</div>
      </div>
      <div class="card">
        <h3>Likes</h3>
        <div class="number" id="profileLikes">—</div>
      </div>
    </div>

    <!-- Bug: fake save — shows "Saved!" but data reverts when you navigate away and come back -->
    <div style="margin-top:28px; background:#fff; border-radius:10px; padding:24px; box-shadow:0 4px 16px rgba(0,0,0,0.06);">
      <h3 style="font-size:14px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px;">Edit Profile</h3>

      <div class="form-group">
        <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Display Name</label>
        <input type="text" id="editName" placeholder="Enter display name"
          style="width:100%; padding:10px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; outline:none;" />
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Bio</label>
        <textarea id="editBio" rows="3" placeholder="Write something about yourself..."
          style="width:100%; padding:10px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; resize:none; outline:none;"></textarea>
      </div>

      <div style="display:flex; align-items:center; gap:10px; margin-top:12px;">
        <!-- Bug: Save is tiny and subtle — important action is visually de-emphasized -->
        <button onclick="fakeSave()" style="padding:4px 8px; font-size:10px; background:#eee; color:#aaa; border:1px solid #ddd; border-radius:4px; cursor:pointer;">Save</button>
        <span id="saveSuccess" style="font-size:11px; color:#27ae60; display:none;">Saved!</span>
      </div>
    </div>
  </div>

  <!-- Navigation stuck at bottom-right corner -->
  <nav class="weird-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="friends.html">Friends</a>
    <a href="friends.html">My Profile</a>
    <a href="#" onclick="alert('Error: Settings failed to load. Please try again later.'); return false;">Settings</a>
  </nav>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    async function loadProfile() {
      try {
        const res = await fetch('/api/profile', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'index.html';
          return;
        }

        const data = await res.json();
        document.getElementById('profileInitial').textContent = data.initial;
        document.getElementById('profileName').textContent = data.name;
        document.getElementById('profileSince').textContent = `Member since ${data.memberSince}`;
        document.getElementById('profilePosts').textContent = data.posts;
        document.getElementById('profileFriends').textContent = data.friends;
        document.getElementById('profileLikes').textContent = data.likes;
      } catch (err) {
        console.error('Failed to load profile:', err);
      }
    }

    // Bug: shows "Saved!" but inputs are just cleared — nothing is sent to the backend
    function fakeSave() {
      const name = document.getElementById('editName').value;
      const bio = document.getElementById('editBio').value;
      if (!name && !bio) return;
      document.getElementById('editName').value = '';
      document.getElementById('editBio').value = '';
      const msg = document.getElementById('saveSuccess');
      msg.style.display = 'inline';
      setTimeout(() => msg.style.display = 'none', 2000);
    }

    loadProfile();
  </script>
</body>
</html>

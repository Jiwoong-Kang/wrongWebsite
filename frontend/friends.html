<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="weird-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="friends.html" class="active">Friends</a>
    <a href="profile.html">My Profile</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="page-content">
    <h1>Friends</h1>
    <p>People you are connected with.</p>

    <!-- Search -->
    <div style="margin-top:20px; background:#fff; border-radius:10px; padding:20px; box-shadow:0 4px 16px rgba(0,0,0,0.06);">
      <h3 style="font-size:14px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Search Friends</h3>
      <form onsubmit="searchFriend(event)" style="display:flex; gap:8px;">
        <input type="text" id="searchInput" name="q" placeholder="Search by name or username..."
          style="flex:1; padding:10px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; outline:none;" />
        <button type="submit"
          style="padding:10px 20px; background:#667eea; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Search</button>
      </form>
      <ul id="searchResults" style="list-style:none; margin-top:12px; padding:0;"></ul>
    </div>

    <!-- Incoming friend requests section -->
    <div id="requestsSection" style="display:none; background:#fff; border-radius:10px; padding:20px; margin-top:24px; box-shadow:0 4px 16px rgba(0,0,0,0.06);">
      <h3 style="font-size:14px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Friend Requests</h3>
      <div id="requestsList"></div>
    </div>

    <div class="friends-grid" id="friendsGrid"></div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    async function loadFriends() {
      try {
        const res = await fetch('/api/friends', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'index.html';
          return;
        }

        const friends = await res.json();
        const grid = document.getElementById('friendsGrid');

        if (!friends.length) {
          grid.innerHTML = '<p style="color:#bbb; font-size:13px; margin-top:24px;">You have no friends yet. Search for people to connect with!</p>';
          return;
        }

        grid.innerHTML = friends.map((f) => `
          <div class="friend-card">
            <div class="friend-avatar">${escapeHtml(f.initial)}</div>
            <p>${escapeHtml(f.name)}</p>
            <span>${escapeHtml(f.status)}</span>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load friends:', err);
      }
    }

    async function loadFriendRequests() {
      try {
        const res = await fetch('/api/friends/requests', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'index.html';
          return;
        }

        const requests = await res.json();
        if (!requests.length) return;

        document.getElementById('requestsSection').style.display = 'block';
        document.getElementById('requestsList').innerHTML = requests.map(r => `
          <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f5f5f5;">
            <span style="font-size:14px; color:#333;">${escapeHtml(r.from)} <span style="color:#aaa; font-size:12px;">@${escapeHtml(r.fromUsername)}</span></span>
            <button
              id="accept-${r.id}"
              onclick="acceptRequest('${r.id}', this)"
              style="padding:6px 16px; font-size:13px; background:#667eea; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600;">
              Accept
            </button>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load friend requests:', err);
      }
    }

    async function acceptRequest(id, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`/api/friends/requests/${id}/accept`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        if (res.ok) {
          btn.replaceWith(Object.assign(document.createElement('span'), {
            textContent: '✓ Accepted',
            style: 'font-size:13px; color:#27ae60; font-weight:600;',
          }));
          loadFriends();
        } else {
          btn.disabled = false;
          btn.insertAdjacentText('afterend', ` ${data.error}`);
        }
      } catch (err) {
        btn.disabled = false;
        btn.insertAdjacentText('afterend', ' Failed');
      }
    }

    async function searchFriend(e) {
      e.preventDefault();
      const query = document.getElementById('searchInput').value.trim();
      const results = document.getElementById('searchResults');
      if (!query) { results.innerHTML = ''; return; }

      try {
        const res = await fetch(`/api/users/search?q=${encodeURIComponent(query)}`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'index.html';
          return;
        }

        const users = await res.json();
        results.innerHTML = users.length
          ? users.map(u => `
              <li style="display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f5f5f5;">
                <span style="font-size:14px; color:#333;">${escapeHtml(u.name)} <span style="color:#aaa; font-size:12px;">@${escapeHtml(u.username)}</span></span>
                <button onclick="addFriend('${escapeHtml(u.username)}', this)"
                  style="padding:6px 14px; font-size:13px; background:#667eea; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600;">
                  Add Friend
                </button>
              </li>
            `).join('')
          : '<li style="font-size:13px; color:#aaa; padding:8px 0;">No results found</li>';
      } catch (err) {
        results.innerHTML = '<li style="font-size:13px; color:#e74c3c;">Search failed</li>';
      }
    }

    async function addFriend(username, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/friends/request', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ toUsername: username }),
        });
        const data = await res.json();
        if (res.ok) {
          btn.replaceWith(Object.assign(document.createElement('span'), {
            textContent: '✓ Request sent',
            style: 'font-size:13px; color:#27ae60; font-weight:600;',
          }));
        } else {
          btn.disabled = false;
          btn.textContent = data.error || 'Failed';
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Failed';
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadFriends();
    loadFriendRequests();
  </script>
</body>
</html>

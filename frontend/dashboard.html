<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="weird-nav">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="friends.html">Friends</a>
    <a href="profile.html">My Profile</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="page-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <h1 style="margin-bottom:0;">Dashboard</h1>
      <button onclick="logout()" style="padding:8px 18px; border:none; background:#e74c3c; color:#fff; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600;">Log out</button>
    </div>
    <p>Here's an overview of your activity.</p>

    <div class="card-row">
      <div class="card">
        <h3>Total Friends</h3>
        <div class="number" id="totalFriends">—</div>
      </div>
      <div class="card">
        <h3>Notifications</h3>
        <div class="number" id="notifications">—</div>
      </div>
      <div class="card">
        <h3>Posts</h3>
        <div class="number" id="postCount">—</div>
      </div>
    </div>

    <!-- Post composer -->
    <div style="margin-top:32px; background:#fff; border-radius:10px; padding:24px; box-shadow:0 4px 16px rgba(0,0,0,0.06);">
      <h3 style="font-size:14px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">What's on your mind?</h3>
      <textarea id="statusInput" rows="3" placeholder="Write a post..."
        style="width:100%; padding:10px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; resize:none; outline:none;"></textarea>
      <div style="display:flex; align-items:center; gap:12px; margin-top:10px;">
        <button onclick="submitPost()" style="padding:8px 20px; font-size:14px; background:#667eea; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600;">Post</button>
        <span id="postSuccess" style="font-size:13px; color:#27ae60; display:none;">Posted!</span>
        <span id="postError" style="font-size:13px; color:#e74c3c; display:none;"></span>
      </div>
    </div>

    <!-- Feed -->
    <div style="margin-top:24px;">
      <h3 style="font-size:14px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px;">Feed</h3>
      <div id="feedList"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    async function loadDashboard() {
      try {
        const res = await fetch('/api/dashboard', {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'index.html';
          return;
        }
        const data = await res.json();
        document.getElementById('totalFriends').textContent = data.totalFriends;
        document.getElementById('notifications').textContent = data.notifications;
        document.getElementById('postCount').textContent = data.posts;
      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }

    async function loadFeed() {
      try {
        const res = await fetch('/api/feed', {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'index.html';
          return;
        }
        const posts = await res.json();
        const list = document.getElementById('feedList');

        if (!posts.length) {
          list.innerHTML = '<p style="color:#bbb; font-size:13px;">No posts yet. Write something or add friends!</p>';
          return;
        }

        list.innerHTML = posts.map(p => `
          <div style="background:#fff; border-radius:10px; padding:20px; margin-bottom:14px; box-shadow:0 4px 16px rgba(0,0,0,0.06);">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
              <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:15px; flex-shrink:0;">
                ${escapeHtml(p.author.charAt(0).toUpperCase())}
              </div>
              <div>
                <p style="font-size:14px; font-weight:600; color:#333; margin:0;">${escapeHtml(p.author)}</p>
                <p style="font-size:11px; color:#bbb; margin:0;">@${escapeHtml(p.username)} · ${formatTime(p.createdAt)}</p>
              </div>
            </div>
            <p style="font-size:14px; color:#444; line-height:1.6; margin:0;">${escapeHtml(p.content)}</p>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load feed:', err);
      }
    }

    async function submitPost() {
      const input = document.getElementById('statusInput');
      const content = input.value.trim();
      const successMsg = document.getElementById('postSuccess');
      const errorMsg = document.getElementById('postError');
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      if (!content) return;

      try {
        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ content }),
        });

        if (!res.ok) {
          const data = await res.json();
          errorMsg.textContent = data.error || 'Failed to post';
          errorMsg.style.display = 'inline';
          return;
        }

        input.value = '';
        successMsg.style.display = 'inline';
        setTimeout(() => successMsg.style.display = 'none', 2000);
        loadFeed();
        loadDashboard();
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server';
        errorMsg.style.display = 'inline';
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    }

    loadDashboard();
    loadFeed();
  </script>
</body>
</html>

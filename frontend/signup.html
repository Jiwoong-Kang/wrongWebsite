<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Create Account</h1>
      <p>Make a new account to enter the weird dashboard.</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Pick a username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Pick a password" required />
        </div>
        <p id="errorMsg" style="color:#e74c3c; font-size:13px; margin-top:10px; display:none;"></p>

        <div class="weird-btn-wrapper">
          <button type="submit" class="weird-btn">spawn<br>me</button>
        </div>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const payload = {
        name: document.getElementById('name').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      };
      const errorMsg = document.getElementById('errorMsg');

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok) {
          errorMsg.textContent = data.error || 'Sign up failed';
          errorMsg.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>

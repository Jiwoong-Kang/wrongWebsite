<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Welcome Back</h1>
      <p>Sign in to your account to continue.</p>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <p id="errorMsg" style="font-size:13px; color:#e74c3c; margin-top:4px; display:none;"></p>

      <button type="button" class="login-btn" id="loginBtn">Login</button>

      <p class="auth-switch" style="margin-top:16px;">
        No account? <a href="signup.html">Create one</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginBtn').addEventListener('click', async function () {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!username || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();
        if (!res.ok) {
          errorMsg.textContent = data.error || 'Login failed';
          errorMsg.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server';
        errorMsg.style.display = 'block';
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>

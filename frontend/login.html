<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Welcome Back</h1>
      <p>Sign in to your account to continue.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>
        <p id="errorMsg" style="color:#e74c3c; font-size:13px; margin-top:10px; display:none;"></p>

        <div class="weird-btn-wrapper">
          <button type="submit" class="weird-btn">do&nbsp;the<br>thing??</button>
        </div>
      </form>

      <p class="auth-switch">
        No account? <a href="signup.html">Create one</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();
        if (!res.ok) {
          errorMsg.textContent = data.error || 'Login failed';
          errorMsg.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>

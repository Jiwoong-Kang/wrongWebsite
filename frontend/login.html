<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Bug: error message is tiny text at the very top of the page, far from the form -->
  <p id="topError" style="position:fixed; top:6px; left:8px; font-size:9px; color:#e74c3c; display:none; z-index:999;"></p>

  <div class="login-wrapper">
    <div class="login-card">
      <h1>Welcome Back</h1>
      <!-- Bug: subtitle is low contrast, hard to read -->
      <p style="color:#d0d0d0;">Sign in to your account to continue.</p>

      <div class="form-group">
        <!-- Bug: label is low contrast -->
        <label for="username" style="color:#ccc; font-size:11px;">Username</label>
        <input type="text" id="username" placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <!-- Bug: Button 1 looks like a normal primary button but does absolutely nothing on click -->
      <button type="button" tabindex="3" class="login-btn-fake">Login</button>

      <!-- Bug: Button 2 looks disabled/secondary but is the only one that actually works.
           tabindex=1 means keyboard focuses this one first, which feels backwards -->
      <button type="button" tabindex="1" class="login-btn-real" id="realLoginBtn">Login</button>

      <p class="auth-switch" style="margin-top:16px;">
        No account? <a href="signup.html">Create one</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    // Bug: fake button does nothing — no handler attached at all

    document.getElementById('realLoginBtn').addEventListener('click', async function () {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const topError = document.getElementById('topError');
      topError.style.display = 'none';

      if (!username || !password) {
        // Bug: error appears at top of page, not under the fields
        topError.textContent = 'Please fill in all fields.';
        topError.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();
        if (!res.ok) {
          topError.textContent = data.error || 'Login failed';
          topError.style.display = 'block';
          return;
        }

        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        topError.textContent = 'Could not connect to server';
        topError.style.display = 'block';
      }
    });
  </script>
</body>
</html>
